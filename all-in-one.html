<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amai | Artisanal Chocolate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f3efe8;
      --warm-cream: #ede7dc;
      --matcha: #8d9a84;
      --charcoal: #2d2d2a;
      --line: #d9d2c6;
      --white: #fffdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      line-height: 1.5;
    }
    .container { width: min(1120px, 92vw); margin: 0 auto; }
    header { padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--line); }
    h1, h2, h3 { font-family: "Cormorant Garamond", serif; letter-spacing: .03em; }
    h1 { font-size: clamp(2rem, 4vw, 3rem); margin: 0; font-weight: 600; }
    .tag { text-transform: uppercase; letter-spacing: .25em; font-size: .7rem; color: #6d6b64; }
    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 2rem; padding: 2rem 0 4rem; }
    .card { background: var(--white); border: 1px solid var(--line); border-radius: 16px; padding: 1.2rem; }
    .card + .card { margin-top: 1rem; }
    input, select, button {
      width: 100%; padding: .72rem .85rem; border-radius: 10px; border: 1px solid var(--line);
      background: #fffcf6; color: var(--charcoal);
    }
    button { cursor: pointer; background: var(--matcha); color: #fbf8f1; border: none; font-weight: 600; }
    .ghost { background: transparent; color: var(--charcoal); border: 1px solid var(--line); }
    .field { margin-bottom: .7rem; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .product { border: 1px solid var(--line); border-radius: 14px; padding: 1rem; background: #fffefb; }
    .product img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; background: var(--warm-cream); }
    .price { font-weight: 600; margin: .4rem 0; }
    .row { display: flex; gap: .6rem; align-items: center; }
    .row > * { flex: 1; }
    .cart-line { display: flex; justify-content: space-between; font-size: .95rem; margin-bottom: .5rem; }
    .muted { color: #6f6c66; }
    .pill { display: inline-block; font-size: .75rem; border: 1px solid var(--line); border-radius: 999px; padding: .15rem .6rem; color: #5f5b55; }
    #status { margin-top: .8rem; min-height: 1rem; font-size: .9rem; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="container">
    <p class="tag">Amai • Japanese Minimalist Chocolate Atelier</p>
    <h1>Digital Boutique Experience</h1>
  </header>

  <main class="container layout">
    <section>
      <div class="card">
        <h2>User Access</h2>
        <div class="field"><input id="fullName" placeholder="Full name" /></div>
        <div class="field"><input id="email" type="email" placeholder="Email" /></div>
        <div class="field"><input id="password" type="password" placeholder="Password" /></div>
        <div class="row">
          <button id="registerBtn">Register</button>
          <button id="loginBtn" class="ghost">Login</button>
        </div>
        <div id="status" class="muted"></div>
      </div>

      <div class="card">
        <h2>Cart</h2>
        <div id="cartLines" class="muted">Login to load your cart.</div>
        <hr style="border:none;border-top:1px solid var(--line); margin: .9rem 0;">
        <div class="cart-line"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
        <button id="refreshCartBtn" class="ghost">Refresh Cart</button>
      </div>
    </section>

    <section>
      <div class="card">
        <div class="row" style="margin-bottom: 1rem;">
          <h2 style="margin:0;">Chocolate Catalog</h2>
          <select id="categoryFilter">
            <option value="">All Categories</option>
            <option value="signature_bonbons">Signature Bonbons</option>
            <option value="bars">Bars</option>
            <option value="hampers">Hampers</option>
          </select>
        </div>
        <div id="products" class="products"></div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = 'http://localhost:4000/api/v1';
    let token = localStorage.getItem('amai_token') || '';

    const statusEl = document.getElementById('status');
    const productsEl = document.getElementById('products');
    const cartLinesEl = document.getElementById('cartLines');
    const subtotalEl = document.getElementById('subtotal');

    async function apiFetch(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (token) headers.Authorization = `Bearer ${token}`;

      const response = await fetch(`${API_BASE}${path}`, { ...options, headers });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || 'Request failed');
      return data;
    }

    function setStatus(msg, error = false) {
      statusEl.textContent = msg;
      statusEl.style.color = error ? '#8a3d3d' : '#5f5b55';
    }

    async function register() {
      try {
        const payload = {
          fullName: document.getElementById('fullName').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        };
        const data = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify(payload) });
        token = data.token;
        localStorage.setItem('amai_token', token);
        setStatus('Registration complete. Session started.');
        await loadCart();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function login() {
      try {
        const payload = {
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        };
        const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify(payload) });
        token = data.token;
        localStorage.setItem('amai_token', token);
        setStatus(`Welcome back, ${data.user.fullName}.`);
        await loadCart();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function loadProducts() {
      const category = document.getElementById('categoryFilter').value;
      const query = category ? `?category=${encodeURIComponent(category)}` : '';

      try {
        const data = await apiFetch(`/products${query}`);
        productsEl.innerHTML = '';
        data.data.forEach((product) => {
          const card = document.createElement('article');
          card.className = 'product';
          card.innerHTML = `
            <img src="${product.image_url || ''}" alt="${product.name}" />
            <span class="pill">${product.category.replace('_', ' ')}</span>
            <h3>${product.name}</h3>
            <p class="muted">${product.description}</p>
            <p class="price">$${(product.price_cents / 100).toFixed(2)}</p>
            <div class="row">
              <input type="number" min="1" value="1" id="qty-${product.id}" />
              <button data-id="${product.id}">Add</button>
            </div>
          `;
          card.querySelector('button').addEventListener('click', () => addToCart(product.id));
          productsEl.appendChild(card);
        });
      } catch (error) {
        productsEl.innerHTML = `<p class="muted">Could not load catalog: ${error.message}</p>`;
      }
    }

    async function addToCart(productId) {
      if (!token) return setStatus('Please login first to add items.', true);
      const qty = Number(document.getElementById(`qty-${productId}`).value) || 1;

      try {
        await apiFetch('/cart/items', {
          method: 'POST',
          body: JSON.stringify({ productId, quantity: qty })
        });
        setStatus('Item added to your cart.');
        await loadCart();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function loadCart() {
      if (!token) return;

      try {
        const cart = await apiFetch('/cart');
        if (!cart.items.length) {
          cartLinesEl.innerHTML = '<p class="muted">Your cart is quietly waiting.</p>';
        } else {
          cartLinesEl.innerHTML = cart.items.map((item) => (
            `<div class="cart-line"><span>${item.name} × ${item.quantity}</span><strong>$${(item.line_total_cents / 100).toFixed(2)}</strong></div>`
          )).join('');
        }
        subtotalEl.textContent = `$${cart.subtotal}`;
      } catch (error) {
        setStatus(`Cart error: ${error.message}`, true);
      }
    }

    document.getElementById('registerBtn').addEventListener('click', register);
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('refreshCartBtn').addEventListener('click', loadCart);
    document.getElementById('categoryFilter').addEventListener('change', loadProducts);

    loadProducts();
    if (token) loadCart();
  </script>
</body>
</html>
